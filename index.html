          gold: '#C8922A',

          textDark: '#1A0F08',
          textMuted: '#7A5C48',
          borderWarm: '#EFEBE4',
          successGreen: '#2D7A4F',
          dangerRed: '#C0392B',
          canvasBg: '#FAF8F5',
        },
        borderRadius: {
          'premium': '16px',
          'button': '10px'
        }
      }
    }
  };
  
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxF1e0fB9v-G_9WxA43-A6Hc4gKfC6r1LAl6nRbAECwYzIOgatWjElKhdRWycIhmrgtbQ/exec"
  };


<script>
// ═══════════════════════════════════════════════════════════════════════════
// نظام المشرفين والصلاحيات — Zam Supervisor Auth System
// ═══════════════════════════════════════════════════════════════════════════

// ── المشرف الافتراضي (الإدارة) ──
const DEFAULT_SUPERVISORS = [
  { name: 'الإدارة', pin: '2026', permissions: ['barista', 'waiter', 'kitchen', 'supervisor'] }
];

// ── تحميل المشرفين من LocalStorage أو الافتراضي ──
let SUPERVISORS = JSON.parse(localStorage.getItem('zam_supervisors')) || [...DEFAULT_SUPERVISORS];
let CURRENT_SUPERVISOR = null;

// ── تهيئة الشاشة عند التحميل ──
window.addEventListener('DOMContentLoaded', () => {
  // تحميل المشرفين من السحابة أولاً
  loadSupervisorsFromCloud();
});

// ── تحميل المشرفين من السحابة ──
async function loadSupervisorsFromCloud() {
  try {
    const response = await fetch(CONFIG.SCRIPT_URL + '?action=getSupervisors');
    const result = await response.json();
    
    if (result.status === 'ok' && result.supervisors && result.supervisors.length > 0) {
      SUPERVISORS = result.supervisors;
      localStorage.setItem('zam_supervisors', JSON.stringify(SUPERVISORS));
    }
  } catch (e) {
    console.log('استخدام المشرفين المحليين');
  } finally {
    loadSupervisorSelect();
    // إظهار شاشة الدخول
    document.getElementById('supervisor-login-screen').classList.remove('hidden');
  }
}

// ── تعبئة قائمة المشرفين ──
function loadSupervisorSelect() {
  const select = document.getElementById('supervisor-select');
  if (!select) return;
  
  select.innerHTML = '<option value="">-- اختر اسم المشرف --</option>';
  
  SUPERVISORS.forEach((sup, idx) => {
    select.innerHTML += `<option value="${idx}">${sup.name}</option>`;
  });
}

// ── تسجيل دخول المشرف ──
function loginSupervisor() {
  const idx = document.getElementById('supervisor-select').value;
  const pin = document.getElementById('supervisor-pin-input').value;
  
  if (idx === '') {
    fireToast('فضلاً اختر اسم المشرف', true);
    return;
  }
  
  if (!pin || pin.length < 4) {
    fireToast('فضلاً أدخل رمز الدخول (4 أرقام)', true);
    return;
  }
  
  const supervisor = SUPERVISORS[parseInt(idx)];
  
  if (!supervisor || supervisor.pin !== pin) {
    fireToast('رمز الدخول غير صحيح', true);
    document.getElementById('supervisor-pin-input').value = '';
    return;
  }
  
  // تسجيل الدخول ناجح
  CURRENT_SUPERVISOR = supervisor;
  localStorage.setItem('zam_current_supervisor', JSON.stringify(supervisor));
  
  // إخفاء شاشة الدخول
  document.getElementById('supervisor-login-screen').classList.add('hidden');
  
  // تعبئة اسم المقيّم تلقائياً
  document.getElementById('evaluator-full-name').value = supervisor.name;
  
  // تطبيق الصلاحيات على الفئات
  applySupervisorPermissions(supervisor.permissions);
  
  fireToast(`مرحباً ${supervisor.name} 👋 صلاحياتك: ${getPermissionLabels(supervisor.permissions)}`);
}

// ── تطبيق الصلاحيات على الفئات ──
function applySupervisorPermissions(permissions) {
  const allRoles = ['barista', 'waiter', 'kitchen', 'supervisor'];
  
  allRoles.forEach(role => {
    const el = document.querySelector(`.role-toggle[data-role="${role}"]`);
    if (!el) return;
    
    if (permissions.includes(role)) {
      el.style.display = 'flex';
      el.classList.remove('opacity-30', 'pointer-events-none');
    } else {
      el.style.display = 'none';
    }
  });
}

// ── ترجمة الصلاحيات ──
function getPermissionLabels(perms) {
  const labels = { barista: '☕', waiter: '🍽️', kitchen: '👨‍🍳', supervisor: '🧑‍💼' };
  return perms.map(p => labels[p] || p).join(' ');
}

// ── تسجيل خروج ──
function logoutSupervisor() {
  CURRENT_SUPERVISOR = null;
  localStorage.removeItem('zam_current_supervisor');
  document.getElementById('supervisor-login-screen').classList.remove('hidden');
  document.getElementById('supervisor-pin-input').value = '';
  fireToast('تم تسجيل الخروج');
}

// ── التحقق من صلاحية المشرف ──
function hasPermission(role) {
  return CURRENT_SUPERVISOR && CURRENT_SUPERVISOR.permissions.includes(role);
}

// ═══════════════════════════════════════════════════════════════════════════
// لوحة إدارة المشرفين (داخل لوحة الإدارة)
// ═══════════════════════════════════════════════════════════════════════════

// ── فتح لوحة إدارة المشرفين ──
function openSupervisorManagement() {
  const rack = document.getElementById('admin-workspace-rack');
  
  rack.innerHTML = `
    <div class="space-y-5">
      
      <!-- قائمة المشرفين الحاليين -->
      <div class="bg-white border border-borderWarm rounded-premium p-5">
        <h3 class="text-sm font-bold text-coffee border-b border-borderWarm pb-2 mb-3">👥 المشرفين المسجلين</h3>
        <div id="supervisors-list" class="space-y-2"></div>
      </div>
      
      <!-- إضافة مشرف جديد -->
      <div class="bg-white border border-borderWarm rounded-premium p-5 space-y-4">
        <h3 class="text-sm font-bold text-coffee border-b border-borderWarm pb-2">➕ إضافة مشرف جديد</h3>
        
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-textMuted mb-1">اسم المشرف *</label>
            <input type="text" id="new-supervisor-name" class="w-full px-3 py-2 bg-foam border border-borderWarm rounded-button text-sm focus:border-gold outline-none" placeholder="مثال: أحمد محمد">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-textMuted mb-1">رمز الدخول (4 أرقام) *</label>
            <input type="password" id="new-supervisor-pin" maxlength="4" class="w-full px-3 py-2 bg-foam border border-borderWarm rounded-button text-sm text-center tracking-widest focus:border-gold outline-none" placeholder="••••">
          </div>
          
          <div>
            <label class="block text-xs font-semibold text-textMuted mb-2">الصلاحيات *</label>
            <div class="flex flex-wrap gap-3 bg-foam p-3 rounded-button">
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="supervisor-perm w-4 h-4 accent-coffee" value="barista" checked>
                <span>☕ باريستا/كاشير</span>
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="supervisor-perm w-4 h-4 accent-coffee" value="waiter">
                <span>🍽️ ويتر/خدمة</span>
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="supervisor-perm w-4 h-4 accent-coffee" value="kitchen">
                <span>👨‍🍳 مطبخ</span>
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="supervisor-perm w-4 h-4 accent-coffee" value="supervisor">
                <span>🧑‍💼 مشرف شيفت</span>
              </label>
            </div>
          </div>
        </div>
        
        <button onclick="addNewSupervisor()" class="w-full bg-successGreen hover:bg-successGreen/90 text-white font-bold py-3 rounded-button transition-all">
          ➕ إضافة المشرف للنظام
        </button>
      </div>
      
    </div>`;
  
  loadSupervisorsList();
}

// ── عرض قائمة المشرفين ──
function loadSupervisorsList() {
  const container = document.getElementById('supervisors-list');
  if (!container) return;
  
  const permLabels = { barista: '☕', waiter: '🍽️', kitchen: '👨‍🍳', supervisor: '🧑‍💼' };
  
  container.innerHTML = SUPERVISORS.map((sup, idx) => `
    <div class="flex justify-between items-center bg-foam p-3 rounded-button border border-borderWarm">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-coffee text-cream rounded-full flex items-center justify-center text-xs font-bold">
          ${sup.name.charAt(0)}
        </div>
        <div>
          <div class="font-bold text-coffee text-sm">${sup.name}</div>
          <div class="text-[10px] text-textMuted">
            ${sup.permissions.map(p => permLabels[p] || p).join(' ')}
          </div>
        </div>
      </div>
      ${idx > 0 ? `
        <button onclick="removeSupervisor(${idx})" class="text-dangerRed hover:bg-dangerRed/10 px-2 py-1 rounded transition-all text-xs" title="حذف">
          🗑️ حذف
        </button>
      ` : '<span class="text-[10px] text-gold bg-gold/10 px-2 py-1 rounded">مدير</span>'}
    </div>
  `).join('');
}

// ── إضافة مشرف جديد ──
function addNewSupervisor() {
  const name = document.getElementById('new-supervisor-name').value.trim();
  const pin = document.getElementById('new-supervisor-pin').value.trim();
  const perms = Array.from(document.querySelectorAll('.supervisor-perm:checked')).map(cb => cb.value);
  
  // التحقق
  if (!name) return fireToast('أدخل اسم المشرف', true);
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) return fireToast('الرمز لازم 4 أرقام', true);
  if (perms.length === 0) return fireToast('اختر صلاحية واحدة على الأقل', true);
  if (SUPERVISORS.find(s => s.name === name)) return fireToast('هذا الاسم موجود بالفعل', true);
  
  // إضافة
  SUPERVISORS.push({ name, pin, permissions: perms });
  localStorage.setItem('zam_supervisors', JSON.stringify(SUPERVISORS));
  
  // مزامنة
  syncSupervisorsToCloud();
  
  // تحديث الواجهة
  loadSupervisorsList();
  loadSupervisorSelect();
  
  // تفريغ الحقول
  document.getElementById('new-supervisor-name').value = '';
  document.getElementById('new-supervisor-pin').value = '';
  document.querySelectorAll('.supervisor-perm').forEach(cb => cb.checked = false);
  
  fireToast(`✅ تم إضافة ${name} بنجاح`);
}

// ── حذف مشرف ──
function removeSupervisor(idx) {
  if (!confirm(`هل أنت متأكد من حذف "${SUPERVISORS[idx].name}"؟`)) return;
  
  SUPERVISORS.splice(idx, 1);
  localStorage.setItem('zam_supervisors', JSON.stringify(SUPERVISORS));
  
  syncSupervisorsToCloud();
  loadSupervisorsList();
  loadSupervisorSelect();
  
  fireToast('تم حذف المشرف');
}

// ── مزامنة المشرفين مع السحابة ──
async function syncSupervisorsToCloud() {
  try {
    await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        action: 'saveSupervisors',
        supervisors: SUPERVISORS
      })
    });
  } catch (e) {
    console.log('تم الحفظ محلياً فقط');
  }
}

  window.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('evaluation-period').value = new Date().toISOString().slice(0, 7);
    
    try {
      showLoadingOverlay('جارٍ مزامنة وتحديث بنود التقييم من السحابة... ☁️');
      const response = await fetch(CONFIG.SCRIPT_URL + '?action=getCriteria');
      const result = await response.json();
      
      if (result && result.status === 'ok' && result.criteria) {
        APP_CRITERIA = result.criteria;
        localStorage.setItem('zam_criteria_cache', JSON.stringify(APP_CRITERIA));
      } else {
        loadCriteriaFromLocalCache();
      }
    } catch (e) {
      console.warn("تعذر الاتصال بالسحابة لجلب البنود، استخدام الكاش المحلي كبديل آمن", e);
      loadCriteriaFromLocalCache();
    } finally {
      hideLoadingOverlay();
    }
  });

  }

  // منطق التمرير التفاعلي لعرض التقدير الفوري (Hover Effect)
  function handleNodeHover(itemId, scoreNum) {
    const badge = document.getElementById(`badge-${itemId}`);
    if (badge) {
      const grade = SCORE_GRADES_10[scoreNum];
      badge.textContent = `تقدير: ${grade.text} (${scoreNum}/10)`;
      badge.className = `px-2.5 py-1 rounded-full text-[10px] font-bold transition-all duration-200 badge-${grade.class}`;
      
      // تطبيق درجات ألوان مسطحة وعصرية على ملصق التقدير المؤقت
      applyBadgeStyle(badge, grade.class);
    }
  }

  function handleNodeOut(itemId) {
    const badge = document.getElementById(`badge-${itemId}`);
    if (badge) {
      const currentSelectedVal = ratings[itemId];
      if (currentSelectedVal) {
        const grade = SCORE_GRADES_10[currentSelectedVal];
        badge.textContent = `تم الحفظ: ${grade.text} (${currentSelectedVal}/10)`;
        applyBadgeStyle(badge, grade.class);
      } else {
        badge.textContent = 'بانتظار التقييم...';
        badge.className = 'px-2.5 py-1 rounded-full text-[10px] font-bold bg-borderWarm text-textMuted';

      }

  function applyBadgeStyle(badge, category) {
    badge.style = ''; // تنظيف الأنماط السابقة
    if (category === 'poor') {
      badge.className = 'px-2.5 py-1 rounded-full text-[10px] font-bold bg-dangerRed/10 text-dangerRed';
    } else if (category === 'acceptable') {
      badge.className = 'px-2.5 py-1 rounded-full text-[10px] font-bold bg-gold/10 text-gold';
    } else if (category === 'good' || category === 'verygood') {
      badge.className = 'px-2.5 py-1 rounded-full text-[10px] font-bold bg-successGreen/10 text-successGreen';
    } else if (category === 'excellent') {
      badge.className = 'px-2.5 py-1 rounded-full text-[10px] font-bold bg-coffee/10 text-coffee';
    }
  }

  function countTotalCriteriaItems() {
    return APP_CRITERIA[selectedRole].reduce((sum, sec) => sum + sec.items.length, 0);
  }

  // ── دالة الحساب الحقيقي لنتائج التقييم المركبة بدقة تامة من 10 درجات ──────────────────
  function evaluateWeightedScore() {
    const sections = APP_CRITERIA[selectedRole];
    let finalAccumulatedValue = 0;
    let sumOfSectionWeights = 0;

    sections.forEach(sec => {
      const ratedSectionItems = sec.items.filter(item => ratings[item.id]);
      if (ratedSectionItems.length === 0) return;

      const sectionSum = ratedSectionItems.reduce((acc, item) => acc + ratings[item.id], 0);
      const sectionAvg = sectionSum / ratedSectionItems.length;

      // بما أن التقييم أصبح من 10، نقسم المتوسط على 10 لتحديد النسبة المئوية
      finalAccumulatedValue += (sectionAvg / 10) * sec.weight;
      sumOfSectionWeights += sec.weight;
    });

    if (sumOfSectionWeights === 0) return 0;
    return Math.round((finalAccumulatedValue / sumOfSectionWeights) * 100);
  }

  function retrieveGradeLabel(score) {
    if (score >= 90) return 'ممتاز (A+)';
    if (score >= 80) return 'جيد جداً (B)';
    if (score >= 70) return 'جيد (C)';
    if (score >= 60) return 'مقبول (D)';
    return 'يحتاج إلى تحسين وتوجيه فوري (F)';
  }

  function recalculateProgressMetrics() {
    const total = countTotalCriteriaItems();
    const completed = Object.keys(ratings).length;
    const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
    const finalScore = evaluateWeightedScore();

    // تحديث أشرطة التقدم والمقاييس المادية
    document.getElementById('fill-progress-bar').style.width = percentage + '%';
    document.getElementById('criteria-progress-percentage').textContent = percentage + '%';
    document.getElementById('criteria-progress-text').textContent = `${completed} من أصل ${total} بند تم تقييمه`;

    document.getElementById('monitor-count').textContent = completed + ' / ' + total;
    
    if (completed > 0) {
      document.getElementById('monitor-score').textContent = finalScore + '%';
      document.getElementById('monitor-grade').textContent = retrieveGradeLabel(finalScore);
    } else {
      document.getElementById('monitor-score').textContent = '—';
      document.getElementById('monitor-grade').textContent = '—';
    }

    document.getElementById('final-submit-btn').disabled = (completed < total) || (total === 0);
  }

      role: selectedRole,
      roleAr: { barista: 'باريستا/كاشير', waiter: 'ويتر/خدمة', kitchen: 'مطبخ', supervisor: 'مشرف شيفت' }[selectedRole],
      totalScore: totalScore,
      rating: retrieveGradeLabel(totalScore),
      strengths: document.getElementById('notable-strengths').value.trim(),
      development: document.getElementById('development-areas').value.trim(),
      ratings: { ...ratings },
      sectionScores: sections.map(sec => {
        const ratedItems = sec.items.filter(item => ratings[item.id]);
        const scorePct = ratedItems.length > 0
          ? Math.round((ratedItems.reduce((acc, item) => acc + ratings[item.id], 0) / (ratedItems.length * 10)) * 100)
          : 0;
        return { section: sec.section, weight: sec.weight, score: scorePct };
      })
    };

    try {
      showLoadingOverlay('جارٍ إرسال التقييم وحفظ البيانات سحابياً... 🚀');
      await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(submissionPayload)
      });
      
      hideLoadingOverlay();
      displaySuccessScreen(submissionPayload);
    } catch (e) {
      hideLoadingOverlay();
      fireToast('حدث خطأ فني أثناء الإرسال. تحقق من الإنترنت وحاول مرة أخرى', true);
    }
  }

      const itemsRows = sec.items.map(item => {
        const score = data.ratings[item.id] || 0;
        const pct   = score * 10;
        const barColor = pct >= 80 ? '#2D7A4F' : pct >= 60 ? '#C8922A' : pct >= 40 ? '#E67E22' : '#C0392B';
        const grade = score >= 9 ? 'ممتاز' : score >= 7 ? 'جيد جداً' : score >= 5 ? 'مقبول' : score > 0 ? 'يحتاج تحسين' : '—';
        return `
          <tr>
            <td style="padding:7px 10px;font-size:11px;color:#1A0F08;border-bottom:1px solid #F0EBE3;line-height:1.5;">${item.label}<br><span style="color:#7A5C48;font-size:10px;">${item.desc || ''}</span></td>

              <div style="background:#EFE9E0;border-radius:4px;height:8px;overflow:hidden;">

            </td>
            <td style="padding:7px 10px;text-align:center;font-size:10px;font-weight:600;color:${barColor};border-bottom:1px solid #F0EBE3;">${grade}</td>

      return `
        <div style="margin-bottom:18px;break-inside:avoid;">
          <div style="background:#2C1810;color:#F5EDD8;padding:8px 14px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;">

          </div>
          <table style="width:100%;border-collapse:collapse;background:#fff;border:1px solid #EFE9E0;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;">
            <thead>
              <tr style="background:#FAF6EE;">
                <th style="padding:7px 10px;font-size:10px;color:#7A5C48;text-align:right;font-weight:600;border-bottom:1px solid #EFE9E0;">بند التقييم</th>

              </tr>
            </thead>
            <tbody>${itemsRows}</tbody>
          </table>
        </div>`;
    }).join('');

    // ── النتيجة الكلية ──
    const scoreColor = data.totalScore >= 80 ? '#2D7A4F' : data.totalScore >= 70 ? '#C8922A' : '#C0392B';
    const scoreBg    = data.totalScore >= 80 ? '#E8F5EE' : data.totalScore >= 70 ? '#FFF8E6' : '#FDECEA';

          <div style="font-size:11px;color:#4A2C1A;line-height:1.7;">${data.strengths}</div>
        </div>` : ''}
        ${data.development ? `
        <div style="background:#FAF6EE;border:1px solid #EFE9E0;border-right:4px solid #2D7A4F;border-radius:8px;padding:12px 14px;">
          <div style="font-size:11px;font-weight:700;color:#2C1810;margin-bottom:6px;">🎯 مجالات التطوير</div>
          <div style="font-size:11px;color:#4A2C1A;line-height:1.7;">${data.development}</div>
        </div>` : ''}

    return `<!DOCTYPE html>

             style="width:52px;height:52px;border-radius:50%;border:2px solid #C8922A;object-fit:cover;"
             onerror="this.style.display='none'">
        <div>
          <div style="font-size:18px;font-weight:700;color:#F5EDD8;letter-spacing:.5px;">زام للقهوة المختصة</div>
          <div style="font-size:11px;color:#F0D080;margin-top:2px;">تقرير تقييم الأداء الشهري الرسمي</div>
        </div>
      </div>
      <div style="text-align:left;">
        <div style="font-size:10px;color:#F0D080;">فترة التقييم</div>
        <div style="font-size:14px;font-weight:700;color:#F5EDD8;">${data.month || '—'}</div>
        <div style="font-size:9px;color:#C8922A;margin-top:3px;">صدر: ${new Date().toLocaleDateString('ar-SA')}</div>
      </div>

  <div style="padding:18px 20px;">

      ${[
        ['👤 اسم الموظف', data.employeeName],
        ['🪪 الرقم الوظيفي', data.employeeId],
        ['🏪 الفرع', data.branch],
        ['💼 الفئة الوظيفية', data.roleAr],

        ['📱 الواتساب', data.employeePhone]
      ].map(([label, val]) => `

    <!-- النتيجة الكلية -->
    <div style="background:${scoreBg};border:2px solid ${scoreColor};border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;" class="no-break">

        </div>

        <div style="font-size:20px;font-weight:800;">${data.totalScore >= 80 ? 'A' : data.totalScore >= 70 ? 'B' : data.totalScore >= 60 ? 'C' : 'D'}</div>

    <!-- ملخص الأقسام -->
    ${data.sectionScores && data.sectionScores.length ? `

  // ════════════════════════════════════════════════════
  // طباعة / حفظ PDF عبر Print Dialog
  // ════════════════════════════════════════════════════
  function generateAndPrintPDF(data) {
    const html = buildPDFHTML(data);
    const printWin = window.open('', '_blank', 'width=900,height=700');
    printWin.document.write(html);
    printWin.document.close();
    printWin.onload = () => {
      setTimeout(() => {
        printWin.focus();
        printWin.print();
      }, 600);
    };
    fireToast('✅ يمكنك حفظه كـ PDF من نافذة الطباعة');
  }

  // ════════════════════════════════════════════════════
  // إرسال PDF عبر واتساب
  // الطريقة: نفتح PDF في نافذة مؤقتة + نفتح واتساب
  // مع رسالة تطلب من المقيّم إرسال الملف المحفوظ
  // ════════════════════════════════════════════════════
  function sendPDFViaWhatsApp(data) {
    // ── فتح واتساب فوراً (ضمن نقرة المستخدم لتجاوز حاجب النوافذ) ──
    let rawPhone = (data.employeePhone || '').replace(/\D/g, '');
    if (rawPhone.startsWith('05'))        rawPhone = '966' + rawPhone.substring(1);
    else if (!rawPhone.startsWith('966')) rawPhone = '966' + rawPhone;

    const msg =
`أهلاً ${data.employeeName} 👋

نود إفادتك بأنه تم إصدار تقرير تقييم أدائك الشهري لـ *${data.month}*.

📊 *النتيجة الكلية:* ${data.totalScore}%
🏅 *التقدير:* ${data.rating}

${data.strengths ? `⭐ *نقاط القوة:*\n${data.strengths}\n\n` : ''}${data.development ? `🎯 *مجالات التطوير:*\n${data.development}\n\n` : ''}📎 ستجد ملف PDF التفصيلي محفوظاً على جهازك، أرجو إرفاقه في هذه المحادثة.
نشكر جهودك ونتمنى لك التوفيق والتميز المستمر.

— إدارة زام للقهوة المختصة ☕`;

    const waURL = `https://wa.me/${rawPhone}?text=${encodeURIComponent(msg)}`;
    // فتح واتساب أولاً (متزامن مع نقرة المستخدم)
    const waWin = window.open(waURL, '_blank');

    // ── فتح PDF بعدها مباشرة ──
    const html = buildPDFHTML(data);
    const printWin = window.open('', '_blank', 'width=900,height=700');
    if (printWin) {
      printWin.document.write(html);
      printWin.document.close();
      printWin.onload = () => setTimeout(() => { printWin.focus(); printWin.print(); }, 500);
    } else {
      fireToast('⚠️ المتصفح حجب نافذة PDF — اضغط "تحميل نسخة PDF" يدوياً', true);
    }

    if (!waWin) {
      fireToast('⚠️ المتصفح حجب واتساب — اسمح بالنوافذ المنبثقة', true);
    } else {
      fireToast('📲 فُتح واتساب + PDF للحفظ والإرفاق يدوياً');
    }
  }

    const tabs = document.querySelectorAll('.admin-tab-btn');
    tabs.forEach(t => t.className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-textMuted transition-all hover:bg-white');
    tabs[0].className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-coffee transition-all bg-white shadow-sm';
    
    currentAdminRole = 'barista';
    buildAdminWorkspaceItems();
  }

  function dismissAdminPanel() {
    document.getElementById('admin-panel-overlay').classList.add('hidden');
    if (selectedRole && document.getElementById('step-two-view').style.display === 'block') {
      ratings = {};
      generateCriteriaElements();
    }
  }

  function switchAdminWorkspace(role, btnEl) {
    currentAdminRole = role;
    
    const tabs = document.querySelectorAll('.admin-tab-btn');
    tabs.forEach(t => {
      t.className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-textMuted transition-all hover:bg-white';
    });
    
    btnEl.className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-coffee transition-all bg-white shadow-sm';
    
    buildAdminWorkspaceItems();
  }

  function buildAdminWorkspaceItems() {
    const rack = document.getElementById('admin-workspace-rack');
    rack.innerHTML = '';
    const sections = APP_CRITERIA[currentAdminRole];

    // ── حساب الأوزان التلقائية (موزّعة بالتساوي حسب عدد الأسئلة) ──
    const totalItems = sections.reduce((s, sec) => s + sec.items.length, 0);
    if (totalItems > 0) {
      let allocated = 0;
      sections.forEach((sec, i) => {
        if (i < sections.length - 1) {
          sec.weight = Math.round((sec.items.length / totalItems) * 100);
          allocated += sec.weight;
        } else {
          sec.weight = 100 - allocated; // القسم الأخير يأخذ الباقي لضمان مجموع 100
        }
      });
    }

    // ── حساب مجموع الأوزان ──
    const totalWeight = sections.reduce((s, sec) => s + (sec.weight || 0), 0);
    const weightOk = totalWeight === 100;

    // ── شريط ملخص الأوزان ──
    rack.innerHTML += `
      <div class="bg-${weightOk ? 'successGreen' : 'dangerRed'}/10 border border-${weightOk ? 'successGreen' : 'dangerRed'}/20 text-${weightOk ? 'successGreen' : 'dangerRed'} px-4 py-2.5 rounded-button text-xs font-bold flex items-center justify-between">
        <span>${weightOk ? '✅' : '⚠️'} مجموع الأوزان الكلية: ${totalWeight}% من أصل 100%</span>
        <span class="text-[10px] opacity-70">تُحسب تلقائياً بناءً على عدد الأسئلة في كل قسم</span>
      </div>`;

    sections.forEach((sec, secIdx) => {
      let itemsHtml = sec.items.map((item, itemIdx) => `
        <div class="bg-foam border border-borderWarm rounded-button p-3 space-y-2">
          <div class="flex gap-2 items-start">
            <div class="flex-1 space-y-1.5">
              <input
                type="text"
                value="${(item.label || '').replace(/"/g, '&quot;')}"
                placeholder="عنوان البند..."
                class="w-full px-3 py-2 bg-white border border-borderWarm rounded-button text-xs font-bold text-coffee focus:border-gold outline-none transition-all"
                onchange="updateCriteriaItem(${secIdx}, ${itemIdx}, 'label', this.value)"
              >
              <input
                type="text"
                value="${(item.desc || '').replace(/"/g, '&quot;')}"
                placeholder="الوصف التوجيهي (اختياري)..."
                class="w-full px-3 py-2 bg-white border border-borderWarm rounded-button text-[11px] text-textMuted focus:border-gold outline-none transition-all"
                onchange="updateCriteriaItem(${secIdx}, ${itemIdx}, 'desc', this.value)"
              >
            </div>
            <button class="text-dangerRed hover:bg-dangerRed/10 p-2 rounded-button transition-all flex-shrink-0 mt-0.5" onclick="triggerCriteriaItemRemoval(${secIdx}, ${itemIdx})" title="حذف البند">🗑️</button>
          </div>
        </div>`).join('');

      if (sec.items.length === 0) {
        itemsHtml = `<p class="text-center text-xs text-textMuted py-3 bg-foam rounded-button border border-dashed border-borderWarm">لا توجد بنود في هذا القسم.</p>`;
      }

      rack.innerHTML += `
        <div class="bg-white border border-borderWarm rounded-premium p-5 space-y-3 shadow-[0_4px_12px_rgba(0,0,0,0.01)]">
          <div class="flex justify-between items-center border-b border-borderWarm pb-2.5 gap-3">
            <input
              type="text"
              value="${(sec.section || '').replace(/"/g, '&quot;')}"
              placeholder="اسم القسم..."
              class="flex-1 px-3 py-1.5 bg-foam border border-borderWarm rounded-button text-xs sm:text-sm font-bold text-coffee focus:border-gold outline-none transition-all"
              onchange="updateSectionName(${secIdx}, this.value)"
            >
            <div class="flex items-center gap-1.5 flex-shrink-0">
              <span class="text-[10px] text-textMuted">الوزن:</span>
              <span class="bg-gold/10 text-gold text-xs font-bold px-2.5 py-1 rounded-full border border-gold/20">${sec.weight}%</span>
              <span class="text-[10px] text-textMuted">(${sec.items.length} سؤال)</span>
            </div>
          </div>
          <div class="space-y-2">${itemsHtml}</div>
          <button class="w-full border border-dashed border-successGreen/30 hover:border-successGreen bg-successGreen/5 hover:bg-successGreen/10 text-successGreen text-xs font-bold py-2.5 rounded-button transition-all flex items-center justify-center gap-1.5" onclick="presentNewItemForm(${secIdx})">
            <span>➕</span> إضافة بند جديد لهذا القسم
          </button>
        </div>`;
    });

    // ── زر إضافة قسم جديد ──
    rack.innerHTML += `
      <button onclick="addNewSection()" class="w-full border-2 border-dashed border-gold/30 hover:border-gold bg-gold/5 hover:bg-gold/10 text-gold text-xs font-bold py-3 rounded-premium transition-all flex items-center justify-center gap-2">
        ➕ إضافة قسم جديد كامل
      </button>`;
  }

  function updateCriteriaItem(secIdx, itemIdx, field, val) {
    APP_CRITERIA[currentAdminRole][secIdx].items[itemIdx][field] = val;
    // لا نعيد بناء الواجهة لتجنب فقدان التركيز، فقط نحدث الأوزان
    updateWeightBadges();
    commitCriteriaSync();
  }

  function updateSectionName(secIdx, val) {
    APP_CRITERIA[currentAdminRole][secIdx].section = val;
    commitCriteriaSync();
  }

  function addNewSection() {
    APP_CRITERIA[currentAdminRole].push({
      section: 'قسم جديد',
      weight: 0,
      items: [{ id: `${currentAdminRole.charAt(0)}_${Math.random().toString(36).substr(2,5)}`, label: 'بند جديد', desc: '' }]
    });
    commitCriteriaSync();
    buildAdminWorkspaceItems();
  }

  function updateWeightBadges() {
    const sections = APP_CRITERIA[currentAdminRole];
    const totalItems = sections.reduce((s, sec) => s + sec.items.length, 0);
    if (totalItems === 0) return;
    let allocated = 0;
    sections.forEach((sec, i) => {
      if (i < sections.length - 1) {
        sec.weight = Math.round((sec.items.length / totalItems) * 100);
        allocated += sec.weight;
      } else {
        sec.weight = 100 - allocated;
      }
    });
  }

  // ── إضافة وحذف البنود ومزامنتها سحابياً على جميع الأجهزة ──────────────────
  function triggerCriteriaItemRemoval(secIdx, itemIdx) {
    APP_CRITERIA[currentAdminRole][secIdx].items.splice(itemIdx, 1);
    commitCriteriaSync();
    buildAdminWorkspaceItems();
  }

  function presentNewItemForm(secIdx) {
    tempAddSectionIndex = secIdx;
    document.getElementById('add-item-title-field').value = '';
    document.getElementById('add-item-desc-field').value = '';
    document.getElementById('new-item-overlay').classList.remove('hidden');
    document.getElementById('add-item-title-field').focus();
  }

  function dismissNewItemForm() {
    document.getElementById('new-item-overlay').classList.add('hidden');
  }

  function confirmNewItemAddition() {
    const label = document.getElementById('add-item-title-field').value.trim();
    const desc = document.getElementById('add-item-desc-field').value.trim();

    if (!label) return fireToast('يرجى إدخال عنوان البند الجديد', true);

    const prefix = currentAdminRole.charAt(0);
    const uniqueId = `${prefix}_${Math.random().toString(36).substr(2, 6)}`;

    APP_CRITERIA[currentAdminRole][tempAddSectionIndex].items.push({
      id: uniqueId,
      label: label,
      desc: desc
    });

    commitCriteriaSync();
    dismissNewItemForm();
    buildAdminWorkspaceItems();
  }

  async function commitCriteriaSync() {
    localStorage.setItem('zam_criteria_cache', JSON.stringify(APP_CRITERIA));
    fireToast('جاري تحديث ومزامنة البنود سحابياً... ☁️');

    try {
      await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'saveCriteria', criteria: APP_CRITERIA })
      });
      fireToast('✅ تمت المزامنة مع كافة الأجهزة بنجاح');
    } catch (e) {
      fireToast('⚠️ فشل التحديث السحابي، تم الحفظ محلياً فقط', true);
    }
  }

  // ── سحب وبناء المخططات البيانية التفاعلية (داشبورد الأداء) عبر Chart.js ──
  async function loadPerformanceAnalytics(btnEl) {
    const tabs = document.querySelectorAll('.admin-tab-btn');
    tabs.forEach(t => {
      t.className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-textMuted transition-all hover:bg-white';
    });
    btnEl.className = 'admin-tab-btn flex-1 text-center py-2.5 rounded-button text-xs font-bold text-coffee transition-all bg-white shadow-sm border border-gold/30';

    const rack = document.getElementById('admin-workspace-rack');
    rack.innerHTML = `
      <div class="text-center py-12 space-y-4">
        <div class="spinner-element mx-auto"></div>
        <p class="text-xs text-textMuted font-bold">جارٍ استخراج وتدقيق التقييمات التراكمية من السحابة...</p>
      </div>`;

    try {
      const response = await fetch(CONFIG.SCRIPT_URL + '?action=getDashboardData');
      const payload = await response.json();

      if (payload && payload.status === 'ok' && payload.data && payload.data.length > 1) {
        renderFullDashboard(rack, payload.data);
      } else {
        rack.innerHTML = `<p class="text-center text-xs text-textMuted py-12">لا توجد أي تقييمات مسجلة في السحابة حتى الآن لبناء الداشبورد.</p>`;
      }
    } catch (e) {
      rack.innerHTML = `<p class="text-center text-xs text-dangerRed font-bold py-12">تعذر سحب البيانات السحابية. يرجى مراجعة اتصال الإنترنت لديك.</p>`;
    }
  }

  // ════════════════════════════════════════════════════
  // داشبورد شامل: موظفين + فروع + فئات + الأفضل أداءً
  // أعمدة الشيت: 0:تاريخ 1:شهر 2:رقم_وظيفي 3:اسم 4:جوال
  //              5:فئة 6:فرع 7:مقيّم 8:نتيجة 9:تقدير ...
  // ════════════════════════════════════════════════════
  function renderFullDashboard(container, rawData) {
    const rows = rawData.slice(1).filter(r => r[2]); // تجاهل الصفوف الفارغة

    if (rows.length === 0) {
      container.innerHTML = `<p class="text-center text-xs text-textMuted py-12">لا توجد بيانات كافية بعد.</p>`;
      return;
    }

    // ── تجميع حسب الموظف ──
    const empMap = {};
    rows.forEach(r => {
      const id = r[2], name = r[3], role = r[5], branch = r[6], score = parseFloat(r[8]) || 0;
      if (!empMap[id]) empMap[id] = { name, role, branch, scores: [] };
      empMap[id].scores.push(score);
    });
    const employees = Object.entries(empMap).map(([id, e]) => ({
      id, name: e.name, role: e.role, branch: e.branch,
      avg: Math.round(e.scores.reduce((a, b) => a + b, 0) / e.scores.length),
      count: e.scores.length
    }));

    // ── تجميع حسب الفرع ──
    const branchMap = {};
    rows.forEach(r => {
      const branch = r[6] || 'غير محدد', score = parseFloat(r[8]) || 0;
      if (!branchMap[branch]) branchMap[branch] = [];
      branchMap[branch].push(score);
    });
    const branches = Object.entries(branchMap).map(([name, scores]) => ({
      name, avg: Math.round(scores.reduce((a, b) => a + b, 0) / scores.length), count: scores.length
    })).sort((a, b) => b.avg - a.avg);

    // ── تجميع حسب الفئة الوظيفية ──
    const roleMap = {};
    rows.forEach(r => {
      const role = r[5] || 'غير محدد', score = parseFloat(r[8]) || 0;
      if (!roleMap[role]) roleMap[role] = [];
      roleMap[role].push(score);
    });
    const roles = Object.entries(roleMap).map(([name, scores]) => ({
      name, avg: Math.round(scores.reduce((a, b) => a + b, 0) / scores.length), count: scores.length
    })).sort((a, b) => b.avg - a.avg);

    // ── الأفضل والأضعف ──
    const sortedEmps = [...employees].sort((a, b) => b.avg - a.avg);
    const topEmployee = sortedEmps[0];
    const bottomEmployee = sortedEmps[sortedEmps.length - 1];
    const topBranch = branches[0];
    const topRole = roles[0];

    const gradeColor = v => v >= 80 ? '#2D7A4F' : v >= 60 ? '#C8922A' : '#C0392B';

    container.innerHTML = `
      <div class="space-y-5">

        <!-- بطاقات الأفضل أداءً -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <div class="bg-gradient-to-br from-gold/15 to-gold/5 border border-gold/30 rounded-premium p-4">
            <div class="text-[10px] text-textMuted font-bold mb-1">🏆 أفضل موظف</div>
            <div class="text-sm font-bold text-coffee">${topEmployee ? topEmployee.name : '—'}</div>
            <div class="text-lg font-bold" style="color:${gradeColor(topEmployee ? topEmployee.avg : 0)}">${topEmployee ? topEmployee.avg : 0}%</div>
            <div class="text-[10px] text-textMuted">${topEmployee ? topEmployee.role : ''} — ${topEmployee ? topEmployee.branch : ''}</div>
          </div>
          <div class="bg-gradient-to-br from-successGreen/15 to-successGreen/5 border border-successGreen/30 rounded-premium p-4">
            <div class="text-[10px] text-textMuted font-bold mb-1">🏪 أفضل فرع</div>
            <div class="text-sm font-bold text-coffee">${topBranch ? topBranch.name : '—'}</div>
            <div class="text-lg font-bold" style="color:${gradeColor(topBranch ? topBranch.avg : 0)}">${topBranch ? topBranch.avg : 0}%</div>
            <div class="text-[10px] text-textMuted">${topBranch ? topBranch.count : 0} تقييم مسجل</div>
          </div>
          <div class="bg-gradient-to-br from-roast/15 to-roast/5 border border-roast/30 rounded-premium p-4">
            <div class="text-[10px] text-textMuted font-bold mb-1">💼 أفضل فئة وظيفية</div>
            <div class="text-sm font-bold text-coffee">${topRole ? topRole.name : '—'}</div>
            <div class="text-lg font-bold" style="color:${gradeColor(topRole ? topRole.avg : 0)}">${topRole ? topRole.avg : 0}%</div>
            <div class="text-[10px] text-textMuted">${topRole ? topRole.count : 0} تقييم مسجل</div>
          </div>
        </div>

        ${bottomEmployee && bottomEmployee.id !== (topEmployee && topEmployee.id) ? `
        <div class="bg-dangerRed/5 border border-dangerRed/20 rounded-button p-3 text-xs flex items-center justify-between">
          <span class="text-textMuted">⚠️ يحتاج متابعة: <span class="font-bold text-coffee">${bottomEmployee.name}</span> (${bottomEmployee.role} — ${bottomEmployee.branch})</span>
          <span class="font-bold" style="color:${gradeColor(bottomEmployee.avg)}">${bottomEmployee.avg}%</span>
        </div>` : ''}

        <!-- مخطط مقارنة الفروع -->
        <div class="bg-white border border-borderWarm rounded-premium p-4 sm:p-5">
          <h3 class="text-xs sm:text-sm font-bold text-coffee mb-3">🏪 مقارنة الأداء بين الفروع</h3>
          <div class="relative w-full h-56"><canvas id="branchChartCanvas"></canvas></div>
        </div>

        <!-- مخطط مقارنة الفئات الوظيفية -->
        <div class="bg-white border border-borderWarm rounded-premium p-4 sm:p-5">
          <h3 class="text-xs sm:text-sm font-bold text-coffee mb-3">💼 مقارنة الأداء بين الفئات الوظيفية</h3>
          <div class="relative w-full h-56"><canvas id="roleChartCanvas"></canvas></div>
        </div>

        <!-- مخطط أداء الموظفين -->
        <div class="bg-white border border-borderWarm rounded-premium p-4 sm:p-5">
          <h3 class="text-xs sm:text-sm font-bold text-coffee mb-3">👥 متوسط أداء كل موظف</h3>
          <div class="relative w-full h-64"><canvas id="empChartCanvas"></canvas></div>
        </div>

        <!-- جدول الترتيب الكامل -->
        <div class="bg-white border border-borderWarm rounded-premium p-4 sm:p-5">
          <h3 class="text-xs sm:text-sm font-bold text-coffee mb-3">📋 جدول ترتيب الموظفين</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-xs">
              <thead>
                <tr class="border-b border-borderWarm text-textMuted">
                  <th class="text-right py-2 px-2">#</th>
                  <th class="text-right py-2 px-2">الاسم</th>
                  <th class="text-right py-2 px-2">الفئة</th>
                  <th class="text-right py-2 px-2">الفرع</th>
                  <th class="text-center py-2 px-2">عدد التقييمات</th>
                  <th class="text-center py-2 px-2">المتوسط</th>
                </tr>
              </thead>
              <tbody>
                ${sortedEmps.map((e, i) => `
                  <tr class="border-b border-borderWarm/50 hover:bg-foam transition-colors">
                    <td class="py-2 px-2 font-bold text-textMuted">${i + 1}${i === 0 ? ' 🏆' : ''}</td>
                    <td class="py-2 px-2 font-bold text-coffee">${e.name}</td>
                    <td class="py-2 px-2 text-textMuted">${e.role}</td>
                    <td class="py-2 px-2 text-textMuted">${e.branch}</td>
                    <td class="py-2 px-2 text-center text-textMuted">${e.count}</td>
                    <td class="py-2 px-2 text-center font-bold" style="color:${gradeColor(e.avg)}">${e.avg}%</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

      </div>`;

    // ── رسم المخططات ──
    drawBarChart('branchChartCanvas', branches.map(b => b.name), branches.map(b => b.avg), '#2D7A4F');
    drawBarChart('roleChartCanvas', roles.map(r => r.name), roles.map(r => r.avg), '#8B4513');
    drawBarChart('empChartCanvas', sortedEmps.map(e => e.name), sortedEmps.map(e => e.avg), '#C8922A');
  }

  let dashChartInstances = {};
  function drawBarChart(canvasId, labels, data, color) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    if (dashChartInstances[canvasId]) dashChartInstances[canvasId].destroy();

    dashChartInstances[canvasId] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'متوسط الأداء (%)',
          data: data,
          backgroundColor: color,
          borderColor: '#2C1810',
          borderWidth: 1.5,
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { font: { family: 'IBM Plex Sans Arabic', size: 10, weight: 'bold' }, color: '#2C1810' } }
        },
        scales: {
          y: { beginAtZero: true, max: 100, grid: { color: 'rgba(44, 24, 16, 0.04)' }, ticks: { color: '#7A5C48', font: { size: 9 } } },
          x: { grid: { display: false }, ticks: { color: '#7A5C48', font: { size: 9 } } }
        }
      }
    });
  }

  // ── الأدوات المساعدة وواجهات المستخدم ─────────────────────────────────
  function showLoadingOverlay(msg) {
    document.getElementById('wait-message-holder').textContent = msg;
    document.getElementById('global-wait-overlay').classList.remove('hidden');
  }

  function hideLoadingOverlay() {
    document.getElementById('global-wait-overlay').classList.add('hidden');
  }

  function fireToast(msg, isError = false) {
    const banner = document.getElementById('system-toast-notif');
    if (!banner) return; // protection
    
    banner.textContent = msg;
    // تهيئة الألوان المسطحة والعصرية للرسالة المنبثقة
    banner.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-[400] px-6 py-3 rounded-button text-sm font-bold shadow-lg transition-all ' + (isError ? 'bg-dangerRed text-white' : 'bg-coffee text-cream');
    
    banner.classList.remove('opacity-0', 'pointer-events-none');
    banner.classList.add('show');
    
    setTimeout(() => {
      banner.classList.remove('show');
      banner.classList.add('opacity-0', 'pointer-events-none');
    }, 3200);
  }
</script>
